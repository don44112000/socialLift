<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accounts — SocialLift</title>
    <meta name="description" content="Manage your connected social accounts across all platforms." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-main">
      <h1>Connected accounts</h1>
      <p class="page-sub">Social accounts and business profiles linked to your dashboard.</p>

      <div class="btn-row" style="margin-bottom: 24px">
        <a class="btn btn-primary" href="/">Connect another platform</a>
      </div>

      <h2 class="section-title">TikTok</h2>
      <div class="grid-2" id="tiktok-accounts"></div>

      <h2 class="section-title">Facebook & Instagram</h2>
      <div class="grid-2" id="fb-accounts"></div>
    </main>

    <script src="./config.js"></script>
    <script src="./shell.js"></script>
    <script src="./api.js"></script>
    <script>
      (async () => {
        const session = await SL.requireAuth("/accounts.html");
        if (!session) return;

        /* --- TikTok --- */
        const ttEl = document.getElementById("tiktok-accounts");
        if (session.tiktok) {
          const tk = session.tiktok;
          const card = document.createElement("div");
          card.className = "account-card";
          card.style.flexDirection = "column";
          card.style.alignItems = "flex-start";
          card.style.gap = "12px";
          card.innerHTML =
            '<div style="display:flex;align-items:center;gap:14px;width:100%">' +
            '<img class="acct-avatar" alt="">' +
            '<div style="flex:1"><div class="acct-name"></div><div class="acct-handle"></div></div>' +
            '<span class="badge ok">Connected</span></div>' +
            '<div style="font-size:0.82rem;color:var(--text-2)"></div>' +
            '<div style="display:flex;gap:20px;font-size:0.82rem;color:var(--text-3)">' +
            '<span><strong style="color:var(--text)">' + SLApi.formatCount(tk.followers_count) + '</strong> followers</span>' +
            '<span><strong style="color:var(--text)">' + SLApi.formatCount(tk.following_count) + '</strong> following</span>' +
            '<span><strong style="color:var(--text)">' + SLApi.formatCount(tk.likes_count) + '</strong> likes</span></div>' +
            '<div class="acct-badges"><span class="badge tiktok">TikTok Business</span>' +
            (tk.is_verified ? '<span class="badge ok">Verified</span>' : '') + '</div>';
          card.querySelector(".acct-avatar").src = tk.avatar_url;
          card.querySelector(".acct-name").textContent = tk.display_name;
          card.querySelector(".acct-handle").textContent = "@" + tk.username;
          card.querySelector("[style*='color:var(--text-2)']").textContent = tk.bio;
          ttEl.appendChild(card);
        } else {
          ttEl.innerHTML = '<div class="empty-state" style="padding:24px"><div class="empty-icon">📱</div><div class="empty-title">TikTok not connected</div><div class="empty-sub"><a href="/">Connect your TikTok business account</a></div></div>';
        }

        /* --- Facebook --- */
        const fbEl = document.getElementById("fb-accounts");
        const pages = session.pages || [];
        if (!pages.length) {
          fbEl.innerHTML = '<div class="empty-state" style="padding:24px"><div class="empty-icon">📘</div><div class="empty-title">Facebook not connected</div><div class="empty-sub"><a href="/">Connect your Facebook Pages</a></div></div>';
          return;
        }
        pages.forEach(p => {
          const card = document.createElement("div");
          card.className = "account-card";
          card.innerHTML =
            '<div style="width:44px;height:44px;border-radius:50%;background:var(--facebook-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--facebook);font-weight:700;font-size:1.1rem"></div>' +
            '<div><div class="acct-name"></div>' +
            '<div class="acct-handle"></div>' +
            '<div class="acct-badges"></div></div>';
          card.querySelector("[style*='facebook-bg']").textContent = p.name.charAt(0).toUpperCase();
          card.querySelector(".acct-name").textContent = p.name;
          card.querySelector(".acct-handle").textContent = "ID: " + p.id + (p.category ? " · " + p.category : "");
          const badges = card.querySelector(".acct-badges");
          badges.innerHTML = '<span class="badge facebook">Facebook Page</span>';
          if ((p.tasks || []).includes("CREATE_CONTENT")) {
            badges.innerHTML += '<span class="badge ok">Can post</span>';
          }
          if (p.instagram_business_account) {
            badges.innerHTML += '<span class="badge ig">IG: @' + (p.instagram_business_account.username || p.instagram_business_account.id) + '</span>';
          }
          fbEl.appendChild(card);
        });
      })();
    </script>
  </body>
</html>
