<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accounts — Wouchh</title>
    <link rel="icon" href="/assets/logo-favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tw-config.js"></script>
    <link rel="stylesheet" href="./facebook.css" />
  </head>
  <body>
    <div id="fb-page-content">
      <div class="space-y-6">
        <div id="page-head"></div>

        <section class="grid grid-cols-1 gap-5 md:grid-cols-2" id="account-grid"></section>
      </div>
    </div>

    <script src="/config.js"></script>
    <script src="./data.js"></script>
    <script src="./ui.js"></script>
    <script src="./shell.js"></script>
    <script>
      (async function () {
        const session = await FB.requireAuth({
          activePath: "/facebook/accounts.html",
          pageTitle: "Accounts",
          searchPlaceholder: "Search accounts...",
        });
        if (!session) return;

        document.getElementById("page-head").appendChild(
          FBUi.pageHeader(
            "Connected Accounts",
            "Manage the profiles powering your inbox, comments, mentions, and reporting views."
          )
        );

        const grid = document.getElementById("account-grid");
        const accounts = await FBData.getAccounts();

        accounts.forEach((acct) => {
          const isInstagram = acct.platform === "instagram";
          const card = document.createElement("article");
          card.className = "fb-panel p-5 sm:p-6";
          card.innerHTML =
            '<div class="flex flex-col gap-5">' +
              '<div class="flex items-start justify-between gap-4">' +
                '<div class="flex items-center gap-4">' +
                  '<div class="flex h-16 w-16 items-center justify-center rounded-3xl ' + (isInstagram ? "bg-gradient-to-br from-yellow-400 via-rose-500 to-violet-600 text-white" : "bg-[#1877f2] text-white") + '">' +
                    '<span class="material-symbols-outlined text-[28px]">' + (isInstagram ? "photo_camera" : "thumb_up") + "</span>" +
                  "</div>" +
                  "<div>" +
                    '<div class="flex flex-wrap items-center gap-2">' +
                      '<h3 class="font-headline-md text-headline-md text-on-surface">' + acct.name + "</h3>" +
                      '<span class="rounded-full bg-primary/10 px-3 py-1 text-xs font-bold text-primary">' + (isInstagram ? "Instagram" : "Facebook") + "</span>" +
                    "</div>" +
                    '<p class="mt-2 text-sm text-on-surface-variant">' + (isInstagram && acct.username ? "@" + acct.username : "Facebook Page") + "</p>" +
                  "</div>" +
                "</div>" +
                '<button type="button" class="fb-icon-button rounded-2xl border border-outline-variant/30" onclick="FB.toast(\'Manage permissions is a demo interaction for now.\')">' +
                  '<span class="material-symbols-outlined">more_horiz</span>' +
                "</button>" +
              "</div>" +
              '<div class="grid grid-cols-1 gap-3 sm:grid-cols-3">' +
                '<div class="rounded-2xl bg-surface-container-low p-4"><p class="text-xs uppercase tracking-[0.12em] text-on-surface-variant">Type</p><p class="mt-2 text-xl font-semibold text-on-surface">' + (isInstagram ? "Instagram" : "Facebook") + "</p></div>" +
                '<div class="rounded-2xl bg-surface-container-low p-4"><p class="text-xs uppercase tracking-[0.12em] text-on-surface-variant">Username</p><p class="mt-2 text-lg font-semibold text-on-surface">' + (isInstagram && acct.username ? "@" + acct.username : "—") + "</p></div>" +
                '<div class="rounded-2xl bg-surface-container-low p-4"><p class="text-xs uppercase tracking-[0.12em] text-on-surface-variant">Account ID</p><p class="mt-2 text-sm font-semibold text-on-surface break-all">' + acct.id + "</p></div>" +
              "</div>" +
              '<div class="flex flex-wrap items-center justify-between gap-3 border-t border-outline-variant/10 pt-4">' +
                '<div class="text-sm text-on-surface-variant">Connected</div>' +
                '<div class="flex flex-wrap gap-2">' +
                  '<button type="button" class="rounded-full border border-outline-variant/30 px-4 py-2 text-sm font-semibold text-on-surface" onclick="FB.toast(\'Refreshing account data for ' + acct.name.replace(/'/g, "\\'") + '.\')">Refresh</button>' +
                  '<button type="button" class="rounded-full bg-primary px-4 py-2 text-sm font-semibold text-white" onclick="FB.toast(\'Permissions manager is a demo interaction for now.\')">Permissions</button>' +
                "</div>" +
              "</div>" +
            "</div>";
          grid.appendChild(card);
        });

        const addCard = document.createElement("a");
        addCard.href = "/";
        addCard.className = "flex min-h-[240px] flex-col items-center justify-center rounded-[24px] border-2 border-dashed border-outline-variant/50 bg-surface-container-low px-6 text-center text-on-surface-variant transition hover:border-primary/40 hover:bg-white";
        addCard.innerHTML =
          '<span class="material-symbols-outlined text-4xl text-primary">add_circle</span>' +
          '<h3 class="mt-4 font-headline-md text-headline-md text-on-surface">Connect another account</h3>' +
          '<p class="mt-2 max-w-sm text-sm">Add another Facebook Page or Instagram business profile to expand coverage.</p>';
        grid.appendChild(addCard);
      })();
    </script>
  </body>
</html>
