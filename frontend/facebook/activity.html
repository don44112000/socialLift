<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity — Wouchh</title>
    <link rel="icon" href="/assets/logo-favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tw-config.js"></script>
    <link rel="stylesheet" href="./facebook.css" />
  </head>
  <body>
    <div id="fb-page-content">
      <div class="space-y-6">
        <div id="page-head"></div>

        <section class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4" id="metrics"></section>

        <section class="fb-panel overflow-hidden">
          <div class="flex items-center justify-between gap-3 border-b border-outline-variant/20 px-4 py-4 sm:px-6">
            <div>
              <h3 class="font-headline-md text-headline-md text-on-surface">Activity Log</h3>
              <p class="mt-1 text-sm text-on-surface-variant">A detailed timeline of audience engagement and team follow-ups.</p>
            </div>
            <button type="button" onclick="FB.toast('CSV export is a demo interaction for now.')" class="rounded-full border border-outline-variant/30 px-4 py-2 text-sm font-semibold text-on-surface">Export</button>
          </div>
          <div class="divide-y divide-outline-variant/10" id="activity-log"></div>
        </section>
      </div>
    </div>

    <script src="/config.js"></script>
    <script src="./data.js"></script>
    <script src="./ui.js"></script>
    <script src="./shell.js"></script>
    <script>
      (async function () {
        const session = await FB.requireAuth({
          activePath: "/facebook/activity.html",
          pageTitle: "Activity",
          searchPlaceholder: "Search activity...",
        });
        if (!session) return;

        document.getElementById("page-head").appendChild(
          FBUi.pageHeader(
            "Activity Log",
            "Follow every mention, message, and response so the team can stay aligned without missing live audience intent."
          )
        );

        const log = await FBData.getActivityLog();
        const metrics = [
          { label: "New mentions", value: log.filter((item) => item.status === "New mention").length, badge: "Live" },
          { label: "Needs reply", value: log.filter((item) => item.status === "Needs reply" || item.status === "Unread" || item.status === "Follow up").length, badge: "Priority", badgeOrange: true },
          { label: "Positive signals", value: log.filter((item) => item.status === "Positive" || item.status === "Shared" || item.status === "High reach").length, badge: "Healthy" },
          { label: "Team actions today", value: log.length, badge: "Rolling" },
        ];
        const metricGrid = document.getElementById("metrics");
        metrics.forEach((item) => metricGrid.appendChild(FBUi.metricCard(item)));

        const list = document.getElementById("activity-log");
        log.forEach((item) => {
          const row = document.createElement("article");
          row.className = "px-4 py-4 sm:px-6";
          row.innerHTML =
            '<div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">' +
              '<div class="space-y-2">' +
                '<div class="flex flex-wrap items-center gap-2">' +
                  '<span class="rounded-full bg-primary/10 px-3 py-1 text-xs font-bold text-primary">' + item.channel + "</span>" +
                  '<span class="rounded-full bg-surface-container-low px-3 py-1 text-xs font-bold text-on-surface-variant">' + item.status + "</span>" +
                "</div>" +
                '<h4 class="text-base font-semibold text-on-surface">' + item.actor + "</h4>" +
                '<p class="max-w-3xl text-sm leading-6 text-on-surface-variant">' + item.action + "</p>" +
              "</div>" +
              '<div class="shrink-0 text-sm font-medium text-on-surface-variant">' + item.time + "</div>" +
            "</div>";
          list.appendChild(row);
        });

        // No activity-log API yet — keep the sample view but mark it coming soon.
        FB.markComingSoon("#fb-page-content", "Coming soon");
      })();
    </script>
  </body>
</html>
