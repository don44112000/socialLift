<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Completing sign-in… — Wouchh</title>
    <link rel="icon" type="image/png" href="/assets/logo-favicon.png" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0d14;
        color: #e6e8f0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .card { text-align: center; max-width: 320px; padding: 24px; }
      .spinner {
        width: 38px; height: 38px; margin: 0 auto 18px;
        border: 3px solid rgba(255, 255, 255, 0.18);
        border-top-color: #1877f2;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      h1 { font-size: 17px; font-weight: 600; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; color: #9aa0b4; margin: 0; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" id="spinner"></div>
      <h1 id="title">Completing sign-in…</h1>
      <p id="subtitle">You can close this window if it doesn't close automatically.</p>
    </div>

    <!--
      The backend redirects here after the Facebook handshake. Two flows:
        1. Popup flow  → identified by window.name (set when the opener called
           window.open, and preserved across the cross-origin OAuth trip). We
           write the result to localStorage — which fires a `storage` event in
           the opener even though COOP severed window.opener — then self-close.
        2. Full-page flow (popup was blocked) → navigate this tab to the app.
      The opener treats /api/me?state= as the source of truth; query params here
      are only forwarded for visibility/logging.
    -->
    <script>
      (function () {
        "use strict";
        var POPUP_NAME = "wouchh_fb_login";
        var RESULT_KEY = "wouchh_auth_result";

        var params = new URLSearchParams(window.location.search);
        var error = params.get("error") || params.get("error_description") || "";
        // Default to success unless the backend explicitly flagged a failure.
        var status = error ? "error" : (params.get("status") || "success");

        // Always signal any opener window via localStorage (works regardless of
        // COOP / window.opener state).
        try {
          localStorage.setItem(
            RESULT_KEY,
            JSON.stringify({ status: status, error: error, t: Date.now() })
          );
        } catch (e) {}

        // window.name survives the cross-origin round-trip, so it reliably tells
        // a popup apart from a normal full-page navigation.
        var isPopup = false;
        try { isPopup = window.name === POPUP_NAME; } catch (e) {}

        if (isPopup) {
          // Popup flow: the opener handles the redirect; just close.
          window.close();
          // If the browser refuses to close it, show a hint instead of stranding.
          setTimeout(function () {
            document.getElementById("spinner").style.display = "none";
            document.getElementById("title").textContent = error
              ? "Sign-in failed"
              : "Sign-in complete";
            document.getElementById("subtitle").textContent =
              "You can close this window and return to Wouchh.";
          }, 600);
        } else {
          // Full-page flow (popup was blocked): continue in this tab.
          window.location.replace(error ? "/" : "/facebook/dashboard.html");
        }
      })();
    </script>
  </body>
</html>
