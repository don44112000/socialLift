<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comments — Wouchh</title>
    <link rel="icon" href="/assets/logo-favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tw-config.js"></script>
    <link rel="stylesheet" href="./facebook.css" />
  </head>
  <body>
    <div id="fb-page-content">
      <div class="space-y-6">
        <div id="page-head"></div>

        <section class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4" id="metrics"></section>

        <div class="flex justify-end md:hidden">
          <button type="button" id="toggle-filters" class="rounded-full border border-outline-variant/30 bg-white px-4 py-2 text-sm font-semibold text-on-surface">Filters</button>
        </div>

        <section id="filters-panel" class="fb-panel fb-filter-panel p-4 sm:p-6 hidden md:block">
          <div class="mb-4 flex items-center justify-between md:hidden">
            <h3 class="font-semibold text-on-surface">Filters</h3>
            <button type="button" id="close-filters" class="fb-icon-button rounded-full border border-outline-variant/20" aria-label="Close filters">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
            <label class="text-sm font-semibold text-on-surface">
              <span class="mb-2 block text-on-surface-variant">Platform</span>
              <select id="platform-filter" class="w-full rounded-2xl border border-outline-variant/30 bg-surface-container-low px-4 py-3 text-base">
                <option value="instagram">Instagram</option>
              </select>
            </label>
            <label class="text-sm font-semibold text-on-surface">
              <span class="mb-2 block text-on-surface-variant">Sentiment</span>
              <select id="sentiment-filter" class="w-full rounded-2xl border border-outline-variant/30 bg-surface-container-low px-4 py-3 text-base">
                <option value="all">All sentiment</option>
                <option value="positive">Positive</option>
                <option value="neutral">Neutral</option>
                <option value="negative">Negative</option>
              </select>
            </label>
            <label class="text-sm font-semibold text-on-surface">
              <span class="mb-2 block text-on-surface-variant">Status</span>
              <select id="status-filter" class="w-full rounded-2xl border border-outline-variant/30 bg-surface-container-low px-4 py-3 text-base">
                <option value="all">All statuses</option>
                <option value="pending">Pending</option>
                <option value="replied">Replied</option>
              </select>
            </label>
          </div>
        </section>

        <section class="fb-panel overflow-hidden">
          <div class="flex flex-col gap-2 border-b border-outline-variant/20 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
            <div>
              <h3 class="font-headline-md text-headline-md text-on-surface">Comment Queue</h3>
              <p class="mt-1 text-sm text-on-surface-variant">Reply or hide comments from one review surface.</p>
            </div>
            <span id="queue-count" class="rounded-full bg-primary/10 px-3 py-1 text-xs font-bold text-primary"></span>
          </div>
          <div id="comments-list"></div>
        </section>
      </div>
    </div>

    <script src="/config.js"></script>
    <script src="./data.js"></script>
    <script src="./ui.js"></script>
    <script src="./shell.js"></script>
    <script>
      (async function () {
        await FB.requireAuth({
          activePath: "/facebook/comments.html",
          pageTitle: "Comments",
          searchPlaceholder: "Search comments...",
        });

        document.getElementById("page-head").appendChild(
          FBUi.pageHeader(
            "Comment Management",
            "Stay on top of questions, mentions, and high-intent responses coming in under your latest content."
          )
        );

        let comments = (await FBData.getComments()).map((item) => ({ ...item }));
        const metrics = document.getElementById("metrics");

        const list = document.getElementById("comments-list");
        const queueCount = document.getElementById("queue-count");
        const platformFilter = document.getElementById("platform-filter");
        const sentimentFilter = document.getElementById("sentiment-filter");
        const statusFilter = document.getElementById("status-filter");
        const toggleFilters = document.getElementById("toggle-filters");
        const closeFilters = document.getElementById("close-filters");
        const filtersPanel = document.getElementById("filters-panel");

        function renderMetrics() {
          metrics.innerHTML = "";
          [
            { label: "Total comments", value: comments.length, badge: "Live" },
            { label: "Mentions in comments", value: comments.filter((item) => item.mentioned_you).length, badge: "Tagged" },
            { label: "Replied", value: comments.filter((item) => item.replied).length, badge: "+15%" },
            { label: "Pending response", value: comments.filter((item) => !item.replied).length, badge: "Priority", badgeOrange: true },
          ].forEach((item) => metrics.appendChild(FBUi.metricCard(item)));
        }

        function matchesSentiment(comment, value) {
          if (value === "all") return true;
          const text = comment.text.toLowerCase();
          if (value === "positive") return /love|amazing|beautiful|fan|looks/.test(text);
          if (value === "neutral") return /when|where|is it|ship|available/.test(text);
          return /problem|issue|late|broken/.test(text);
        }

        function render() {
          list.innerHTML = "";
          let filtered = comments.slice();

          if (platformFilter.value !== "all") filtered = filtered.filter((item) => item.platform === platformFilter.value);
          if (statusFilter.value === "pending") filtered = filtered.filter((item) => !item.replied);
          if (statusFilter.value === "replied") filtered = filtered.filter((item) => item.replied);
          filtered = filtered.filter((item) => matchesSentiment(item, sentimentFilter.value));

          queueCount.textContent = filtered.length + " visible";

          if (!filtered.length) {
            const empty = document.createElement("div");
            empty.className = "px-4 py-10 text-center text-on-surface-variant sm:px-6";
            empty.innerHTML = '<h3 class="font-headline-md text-headline-md text-on-surface">No comments match these filters</h3><p class="mt-2 text-sm">Adjust the filters to bring more conversations back into view.</p>';
            list.appendChild(empty);
            return;
          }

          filtered.forEach((comment) => {
            const row = document.createElement("article");
            row.className = "border-t border-outline-variant/10 px-4 py-5 first:border-t-0 sm:px-6";
            row.innerHTML =
              '<div class="flex flex-col gap-4 lg:flex-row lg:items-start">' +
                '<img src="' + comment.user.avatar + '" alt="" class="h-11 w-11 rounded-full border border-outline-variant/10 object-cover">' +
                '<div class="min-w-0 flex-1">' +
                  '<div class="flex flex-wrap items-center gap-2">' +
                    '<span class="font-semibold text-on-surface">' + comment.user.name + "</span>" +
                    '<span class="rounded-full bg-surface-container-low px-2.5 py-1 text-[11px] font-bold uppercase text-on-surface-variant">' + comment.platform + "</span>" +
                    (comment.mentioned_you ? '<span class="rounded-full bg-primary/10 px-2.5 py-1 text-[11px] font-bold text-primary">Mentioned you</span>' : "") +
                    '<span class="text-sm text-on-surface-variant">' + FBData.relativeTime(comment.time) + "</span>" +
                  "</div>" +
                  '<p class="mt-3 text-base leading-7 text-on-surface">' + comment.text + "</p>" +
                  (comment.replied && comment.reply
                    ? '<div class="mt-4 rounded-2xl bg-surface-container-low px-4 py-4 text-sm leading-6 text-on-surface-variant"><strong class="text-primary">Your reply:</strong> ' + comment.reply.text + "</div>"
                    : '<div class="mt-4 flex flex-col gap-3 sm:flex-row"><input type="text" class="reply-input min-h-[48px] flex-1 rounded-full border border-outline-variant/30 bg-white px-4 text-base" placeholder="Write a public reply..."><button type="button" class="send-reply rounded-full bg-primary px-5 py-3 text-sm font-semibold text-white">Send reply</button></div>') +
                  '<div class="mt-4 flex flex-wrap gap-3 text-sm font-semibold">' +
                    '<button type="button" class="hide-comment text-on-surface-variant hover:text-primary">Hide</button>' +
                  '</div>' +
                "</div>" +
                '<div class="h-16 w-16 shrink-0 overflow-hidden rounded-2xl border border-outline-variant/20 bg-surface-container-low">' +
                  '<img src="' + comment.post_thumbnail + '" alt="" class="h-full w-full object-cover">' +
                "</div>" +
              "</div>";

            const input = row.querySelector(".reply-input");
            const send = row.querySelector(".send-reply");
            if (input && send) {
              function submitReply() {
                const value = input.value.trim();
                if (!value) return;
                send.disabled = true;
                FBData.replyComment(comment.id, value, comment.account_id)
                  .then(() => {
                    comment.replied = true;
                    comment.reply = { text: value, time: Date.now() / 1000 };
                    FB.toast("Reply posted successfully.");
                    renderMetrics();
                    render();
                  })
                  .catch((err) => {
                    alert(err.message || "Failed to post reply.");
                    send.disabled = false;
                  });
              }
              send.addEventListener("click", submitReply);
              input.addEventListener("keydown", function (event) {
                if (event.key === "Enter") submitReply();
              });
            }

            const hideBtn = row.querySelector(".hide-comment");
            if (comment.hidden) {
              hideBtn.textContent = "Unhide";
            }
            hideBtn.addEventListener("click", function () {
              const newHideState = !comment.hidden;
              FBData.hideComment(comment.id, newHideState, comment.account_id)
                .then(() => {
                  comment.hidden = newHideState;
                  hideBtn.textContent = newHideState ? "Unhide" : "Hide";
                  FB.toast(newHideState ? "Comment hidden." : "Comment unhidden.");
                })
                .catch((err) => {
                  alert(err.message || "Failed to update comment visibility.");
                });
            });
            list.appendChild(row);
          });
        }

        toggleFilters.addEventListener("click", function () {
          filtersPanel.classList.toggle("hidden");
        });
        closeFilters.addEventListener("click", function () {
          filtersPanel.classList.add("hidden");
        });
        platformFilter.addEventListener("change", render);
        sentimentFilter.addEventListener("change", render);
        statusFilter.addEventListener("change", render);
        renderMetrics();
        render();
      })();
    </script>
  </body>
</html>
