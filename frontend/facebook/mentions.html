<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentions — Wouchh</title>
    <link rel="icon" href="/assets/logo-favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tw-config.js"></script>
    <link rel="stylesheet" href="./facebook.css" />
  </head>
  <body>
    <div id="fb-page-content">
      <div class="space-y-6">
        <div id="page-head"></div>

        <section class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4" id="metrics"></section>

        <div class="flex items-center justify-between gap-3 md:hidden">
          <div id="sub-tabs-mobile"></div>
          <button type="button" id="toggle-filters" class="rounded-full border border-outline-variant/30 bg-white px-4 py-2 text-sm font-semibold text-on-surface">Filters</button>
        </div>

        <section id="filters-panel" class="fb-panel p-4 sm:p-6 hidden md:block">
          <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
            <label class="text-sm font-semibold text-on-surface">
              <span class="mb-2 block text-on-surface-variant">Date Range</span>
              <select id="date-filter" class="w-full rounded-2xl border border-outline-variant/30 bg-surface-container-low px-4 py-3 text-base">
                <option value="7d">Last 7 days</option>
                <option value="30d">Last 30 days</option>
                <option value="90d">Last 90 days</option>
              </select>
            </label>
            <label class="text-sm font-semibold text-on-surface">
              <span class="mb-2 block text-on-surface-variant">Platform</span>
              <select id="platform-filter" class="w-full rounded-2xl border border-outline-variant/30 bg-surface-container-low px-4 py-3 text-base">
                <option value="all">All platforms</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
              </select>
            </label>
            <label class="text-sm font-semibold text-on-surface">
              <span class="mb-2 block text-on-surface-variant">Type</span>
              <select id="type-filter" class="w-full rounded-2xl border border-outline-variant/30 bg-surface-container-low px-4 py-3 text-base">
                <option value="all">All types</option>
                <option value="story">Stories</option>
                <option value="post">Posts</option>
              </select>
            </label>
          </div>
        </section>

        <div class="hidden md:block" id="sub-tabs-desktop"></div>

        <section class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-3" id="mention-grid"></section>
      </div>
    </div>

    <script src="/config.js"></script>
    <script src="./data.js"></script>
    <script src="./ui.js"></script>
    <script src="./shell.js"></script>
    <script>
      (async function () {
        const session = await FB.requireAuth({
          activePath: "/facebook/mentions.html",
          pageTitle: "Mentions",
          searchPlaceholder: "Search mentions...",
        });

        const bizName = (session && session.business && session.business.name) || "your business";
        document.getElementById("page-head").appendChild(
          FBUi.pageHeader(
            "Mentions Monitoring",
            "Track where " + bizName + " appears across conversations, creator shares, and customer shout-outs."
          )
        );

        const mentions = await FBData.getMentions();
        const metrics = document.getElementById("metrics");
        const stories = mentions.filter((item) => item.type.toLowerCase().includes("story"));
        const posts = mentions.filter((item) => item.type.toLowerCase().includes("post"));
        const reach = mentions.reduce((total, item) => total + item.reach, 0);
        [
          { label: "Total mentions", value: mentions.length, badge: "+12%" },
          { label: "Story tags", value: stories.length, badge: "+8%" },
          { label: "Post tags", value: posts.length, badge: "+4%" },
          { label: "Total reach", value: FBData.formatCount(reach), badge: "Engagement" },
        ].forEach((item) => metrics.appendChild(FBUi.metricCard(item)));

        const grid = document.getElementById("mention-grid");
        const platformFilter = document.getElementById("platform-filter");
        const typeFilter = document.getElementById("type-filter");
        const filtersPanel = document.getElementById("filters-panel");
        const toggleFilters = document.getElementById("toggle-filters");
        let activeTab = "all";

        function renderTabs(target) {
          target.appendChild(
            FBUi.tabBar(
              [
                { label: "All", value: "all" },
                { label: "Stories", value: "stories" },
                { label: "Posts", value: "posts" },
              ],
              function (value) {
                activeTab = value;
                render();
              }
            )
          );
        }

        renderTabs(document.getElementById("sub-tabs-mobile"));
        renderTabs(document.getElementById("sub-tabs-desktop"));

        function render() {
          grid.innerHTML = "";
          let filtered = mentions.slice();

          if (activeTab === "stories") filtered = filtered.filter((item) => item.type.toLowerCase().includes("story"));
          if (activeTab === "posts") filtered = filtered.filter((item) => item.type.toLowerCase().includes("post"));
          if (platformFilter.value !== "all") filtered = filtered.filter((item) => item.platform === platformFilter.value);
          if (typeFilter.value !== "all") filtered = filtered.filter((item) => item.type.toLowerCase().includes(typeFilter.value));

          if (!filtered.length) {
            grid.appendChild(FBUi.emptyState("No mentions found", "Try widening your filters to surface more tagged content."));
            return;
          }

          filtered.forEach((mention) => {
            const instagram = mention.platform === "instagram";
            const card = document.createElement("article");
            card.className = "fb-panel overflow-hidden";
            card.innerHTML =
              '<div class="relative aspect-[4/3] overflow-hidden bg-surface-container-low">' +
                '<img src="' + mention.thumbnail + '" alt="" class="h-full w-full object-cover">' +
                '<span class="absolute right-4 top-4 rounded-full px-3 py-1 text-xs font-bold ' + (instagram ? "bg-white text-[#a73a00]" : "bg-[#1877f2] text-white") + '">' + mention.type + "</span>" +
              "</div>" +
              '<div class="p-5">' +
                '<div class="flex items-center gap-3">' +
                  '<img src="' + mention.user.avatar + '" alt="" class="h-10 w-10 rounded-full border border-outline-variant/10 object-cover">' +
                  "<div>" +
                    '<p class="font-semibold text-on-surface">' + mention.user.name + "</p>" +
                    '<p class="text-sm text-on-surface-variant">@' + mention.user.handle + " • " + FBData.relativeTime(mention.time) + "</p>" +
                  "</div>" +
                "</div>" +
                '<p class="mt-4 text-sm leading-6 text-on-surface-variant">' + mention.text + "</p>" +
                '<div class="mt-5 flex flex-wrap items-center justify-between gap-3 border-t border-outline-variant/10 pt-4">' +
                  '<div class="flex flex-wrap gap-4 text-sm text-on-surface-variant">' +
                    "<span>Reach " + FBData.formatCount(mention.reach) + "</span>" +
                    "<span>Likes " + FBData.formatCount(mention.likes) + "</span>" +
                    "<span>Comments " + FBData.formatCount(mention.comments) + "</span>" +
                  "</div>" +
                  '<button type="button" class="rounded-full bg-primary px-4 py-2 text-sm font-semibold text-white" onclick="FB.toast(\'Opening mention view is a demo interaction for now.\')">Review</button>' +
                "</div>" +
              "</div>";
            grid.appendChild(card);
          });
        }

        toggleFilters.addEventListener("click", function () {
          filtersPanel.classList.toggle("hidden");
        });
        platformFilter.addEventListener("change", render);
        typeFilter.addEventListener("change", render);
        render();
      })();
    </script>
  </body>
</html>
